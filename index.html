<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Finder-Fetch API</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="">
      <h1 class="text-center">Spicy Meal Food</h1>
      <div class="d-flex justify-content-center">
        <form class="col-15 col-lg-auto mb-3">
          <div class="input-group input-group-lg">
            <input
              type="search"
              class="form-control form-control-dark text-bg-dark w-200"
              id="search"
              placeholder="Search Meal... (pizza)"
              aria-label="Search"
              autocomplete="on"
            />
          </div>
        </form>
        <div class="text-end">
          <button
            type="submit"
            class="btn btn-warning rounded-end-pill"
            id="submit"
          >
            <i class="bi bi-search fs-4"></i>
          </button>
        </div>
      </div>
      <div class="d-flex justify-content-center">
        <button type="button" class="btn btn-primary" id="random">
          Random
        </button>
      </div>
      <p class="text-center fs-3" id="result-heading">Search Result:</p>
      <div id="one-meal" class="text-center">

        </div>
        <div class="d-flex justify-content-center meals-container">
          <div id="meals" class="album py-10 text-center">
          <div
              class="row row-cols-1 row-cols-sm-3 row-cols-md-3"
              id="meals"
            >
          </div>
          </div>
        </div>
        
    </div>
  </body>
  <script src="./script.js"></script>
</html>
